<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-header">
                <h1>Login</h1>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginId">Login ID</label>
                    <input type="text" id="loginId" name="loginId" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <div class="register-link">
                <p>Don't have an account? <a href="index.html">Register here</a></p>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
const loginForm = document.getElementById('loginForm');
const notification = document.getElementById('notification');

function showNotification(message, type = 'error') {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.className = `notification ${type}`;
    notif.style.display = 'block';
    setTimeout(() => {
        notif.style.display = 'none';
    }, 3000);
}

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginId = document.getElementById('loginId').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/users/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ loginId, password })
        });

        const data = await response.json();

        if (data.success) {
            const loggedInUser = data.user; // Get the full user object
            localStorage.setItem('userId', loggedInUser._id);
            localStorage.setItem('userData', JSON.stringify(loggedInUser)); // Store the full object
            showNotification('Login successful', 'success');

            socket.emit('userConnected', loggedInUser); // Emit with the full user object

            setTimeout(() => {
                window.location.href = '/live-users.html';
            }, 1000);
        } else {
            showNotification(data.message, 'error');
        }
    } catch (error) {
        console.error('Login error:', error);
        showNotification('Login failed. Please try again.', 'error');
    }
});

    </script>
</body>
</html>
